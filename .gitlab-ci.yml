# Knit — GitLab CI. Stages: build -> test -> verify.
# Bleeding-edge toolchain (AGP 9.2.1 / Kotlin 2.2.10 / JDK 21 / compileSdk 36.1):
# all analysis runs as standalone tools so nothing new is added to the Gradle build.

stages:
  - build
  - test
  - verify

variables:
  # Keep Gradle's home in the project tree so the resolved-dependency jars are cached across jobs.
  # (Trivy CVE scanning now reads the committed app/gradle.lockfile, not these jars — see verify:trivy.)
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"
  # daemon=false keeps no daemon alive between jobs; it does NOT stop Gradle forking a
  # single-use worker JVM (it does, to honour org.gradle.jvmargs). That worker's heap is
  # what the OOM killer reaps on this 2 GB VM — it's capped in the CI gradle.properties
  # written by before_script below, which overrides the project gradle.properties.
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  ANDROID_HOME: "${CI_PROJECT_DIR}/.android-sdk"
  ANDROID_SDK_ROOT: "${CI_PROJECT_DIR}/.android-sdk"
  # Pinned tool versions — bump deliberately (see .gitlab-ci notes in the repo plan).
  CMDLINE_TOOLS_VERSION: "11076708"   # commandlinetools-linux revision
  ANDROID_COMPILE_SDK: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  DETEKT_VERSION: "1.23.8"

workflow:
  rules:                              # avoid duplicate branch+MR pipelines
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS == null
    - if: $CI_COMMIT_TAG

# ---- shared setup for Gradle/Android jobs ----
.android:
  image: eclipse-temurin:21-jdk
  before_script:
    - apt-get update -qq && apt-get install -y -qq unzip wget > /dev/null
    - export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    # CI memory profile for the 1 vCPU / 2 GB runner — relies on the host's 2 GB swap being
    # active. Written to $GRADLE_USER_HOME so it overrides the project gradle.properties.
    # NO metaspace cap: a 384m cap starved Metaspace and crashed the daemon (job 462). Heap is
    # 1280m — big enough for Kotlin/Compose yet small enough to stay resident in 1.9 GiB of RAM
    # so GC pages don't thrash; Metaspace/native/launcher-JVM spikes spill to swap instead of
    # tripping the OOM killer. SerialGC because there is only one core to GC on. Self-contained.
    - |
      mkdir -p "$GRADLE_USER_HOME"
      cat > "$GRADLE_USER_HOME/gradle.properties" <<'EOF'
      org.gradle.jvmargs=-Xmx1280m -XX:+UseSerialGC -Dfile.encoding=UTF-8
      org.gradle.workers.max=1
      kotlin.compiler.execution.strategy=in-process
      org.gradle.daemon=false
      EOF
    - |
      if [ ! -d "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" ]; then
        wget -q "https://dl.google.com/android/repository/commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip" -O /tmp/clt.zip
        mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
        unzip -q /tmp/clt.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
        mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
      fi
    - yes | sdkmanager --licenses > /dev/null 2>&1 || true
    - sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" > /dev/null
    - chmod +x ./gradlew
  cache:
    key:
      files:
        - gradle/libs.versions.toml
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      - .gradle/caches/
      - .gradle/wrapper/
      - .android-sdk/

# ----------------- build -----------------
build:debug:
  extends: .android
  stage: build
  script:
    - ./gradlew :app:assembleDebug --stacktrace --console=plain
  artifacts:
    name: "knit-debug-$CI_COMMIT_SHORT_SHA"
    paths:
      - app/build/outputs/apk/debug/*.apk
    expire_in: 1 week

# R8 is exercised ONLY on the release variant (debug never shrinks), so this is the only CI guard against
# keep-rule breakage. First cut: allow_failure while the keep rules stabilize (obfuscation is still off and
# verification is on-device); flip to false once green so R8 regressions block the pipeline. Builds UNSIGNED
# (no KNIT_UPLOAD_* creds in CI) — signing isn't needed to run R8. R8 is heap-heavy: if it OOMs on the 2 GB
# runner (SerialGC / 1280m from .android), give this job a bigger heap or runner. Archives mapping/ so
# usage.txt (removed classes, incl. the demo/fake code) and configuration.txt are auditable per pipeline.
build:release:
  extends: .android
  stage: build
  allow_failure: true
  script:
    - ./gradlew :app:assembleRelease --stacktrace --console=plain
  artifacts:
    name: "knit-release-r8-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/
    expire_in: 1 week

# ----------------- test ------------------
test:unit:
  extends: .android
  stage: test
  script:
    - ./gradlew :app:testDebugUnitTest --stacktrace --console=plain
  artifacts:
    when: always
    reports:
      junit: app/build/test-results/testDebugUnitTest/**/TEST-*.xml
    paths:
      - app/build/reports/tests/testDebugUnitTest/
    expire_in: 1 week

# Test coverage (advisory) — Kover instruments the *debug* unit tests and reports line coverage over the
# hand-written code (generated Room _Impl / Compose / BuildConfig are excluded in app/build.gradle.kts).
# koverXmlReportDebug depends on testDebugUnitTest, so the report tasks run the tests themselves. Kept a
# separate job (not folded into test:unit) to mirror the detekt/trivy advisory-verify pattern and keep the
# pass/fail test signal clean; the tradeoff is it re-runs the Robolectric suite. allow_failure so coverage
# never blocks. The `coverage:` regex scrapes the % that koverLogDebug prints so GitLab shows it on the MR
# and as the pipeline badge. HTML (browsable) + XML (JaCoCo format) are archived.
test:coverage:
  extends: .android
  stage: test
  allow_failure: true
  script:
    - ./gradlew :app:koverXmlReportDebug :app:koverHtmlReportDebug :app:koverLogDebug --stacktrace --console=plain
  coverage: '/application line coverage: \d+\.\d+%/'
  artifacts:
    when: always
    paths:
      - app/build/reports/kover/htmlDebug/
      - app/build/reports/kover/reportDebug.xml
    expire_in: 1 week

# --------------- verify (advisory) -------
verify:detekt:
  image: eclipse-temurin:21-jdk
  stage: verify
  allow_failure: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq wget > /dev/null
    - wget -q "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/detekt-cli-${DETEKT_VERSION}-all.jar" -O /tmp/detekt.jar
  script:
    - >
      java -jar /tmp/detekt.jar
      --input app/src/main/java,app/src/test/java
      --config config/detekt/detekt.yml
      --build-upon-default-config
      --jvm-target 11
      --report xml:detekt.xml --report html:detekt.html --report sarif:detekt.sarif
  artifacts:
    when: always
    paths: [detekt.html, detekt.xml, detekt.sarif]
    expire_in: 1 week

verify:trivy:
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  stage: verify
  allow_failure: true
  # No `needs:` — Trivy scans the committed app/gradle.lockfile, so it's independent of the build job.
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    - key: trivy-db
      paths: [.trivycache/]
  script:
    - trivy --version
    - trivy fs --scanners vuln,secret,misconfig,license --exit-code 0 --format table .
    - trivy fs --scanners vuln,secret,misconfig,license --format json --output trivy-report.json .
  artifacts:
    when: always
    paths: [trivy-report.json]
    expire_in: 1 week
