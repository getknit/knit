# Robolectric config for the JVM Room/DAO + migration tests (finding #5).
#
# Pin the emulated SDK to 36 (Baklava) — the app's compileSdk major API. Robolectric 4.16 is the first
# release that ships an android-all runtime for SDK 36, and it requires JDK 21 (this repo's toolchain).
# The DAO tests read no Android resources (they only need a Context + framework SQLite), so the SDK level
# is not load-bearing for them; if the SDK-36 runtime ever misbehaves at init, drop this to sdk=35 (legacy
# resources) — the tests are SDK-agnostic. See app/build.gradle.kts testOptions and RoomDbTest.kt.
sdk=36

# Use a plain Application, not the manifest's KnitApplication. KnitApplication.onCreate starts Koin, and
# Koin's static GlobalContext isn't reset between tests in the same JVM, so the real app throws
# KoinApplicationAlreadyStartedException on the second test. DAO/migration tests build the DB directly
# (bypassing Koin), so they need no app bootstrap. A future test that wants the real graph can override with
# @Config(application = KnitApplication::class).
application=android.app.Application
