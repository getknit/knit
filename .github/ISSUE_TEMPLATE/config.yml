# Issue-template chooser for Knit.
# https://docs.github.com/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository
#
# Blank issues are disabled so reports flow through the Bug / Feature forms; open-ended questions go to
# Discussions via the link below. Flip blank_issues_enabled to true to also accept free-form issues.
blank_issues_enabled: false
contact_links:
  - name: 🔒 Report a security vulnerability (private)
    url: https://github.com/getknit/knit/security/advisories/new
    about: >-
      Do NOT open a public issue for security bugs. Use GitHub's private vulnerability reporting (or
      email, per SECURITY.md) — public disclosure before a fix exists puts users at risk.
  - name: 💬 Questions & general discussion
    url: https://github.com/getknit/knit/discussions
    about: For usage questions, ideas, and open-ended discussion that isn't a bug or a concrete feature request.
  - name: 📖 Contributing guide & support expectations
    url: https://github.com/getknit/knit/blob/main/CONTRIBUTING.md
    about: Knit is a best-effort hobby project shipped as-is. Please read this before filing.
