# Gradle daemon JVM criteria. JDK 21 is a hard requirement (see .agents/rules/build-and-test.md).
#
# The `toolchainUrl.*` entries that `./gradlew updateDaemonJvm` generates here have been REMOVED on
# purpose: they let Gradle auto-download a JDK from api.foojay.io when none matches locally, which makes
# the compiler an unpinned, network-fetched input to a build that must be byte-reproducible on F-Droid's
# buildserver. Without them Gradle fails loudly with "no matching toolchain" and the builder installs
# JDK 21 itself (the fdroiddata recipe does this in its `sudo:` block).
#
# If you re-run `./gradlew updateDaemonJvm` it will write those URLs back — delete them again.
toolchainVersion=21
