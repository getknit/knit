# In-repo F-Droid metadata. Two jobs:
#   1. Lets `fdroid build` build Knit straight from a checkout, so the buildserver recipe can be tested
#      locally in F-Droid's own container before anything is submitted.
#   2. Source of truth for `metadata/app.getknit.knit.yml` in fdroiddata — edit here, copy there, so the
#      two cannot drift.
# Field reference: https://f-droid.org/docs/Build_Metadata_Reference/
# Background and the reproducibility contract: .agents/context/distribution.md
#
# NOTE: a local `fdroid build` needs JDK 21 already present — settings.gradle.kts omits the foojay resolver,
# so Gradle won't fetch one (it fails loudly). The F-Droid buildserver already has JDK 21 selected.

# On-device content moderation runs Google's TensorFlow Lite (LiteRT) as a prebuilt native library
# (com.google.ai.edge.litert). It is freely licensed (Apache-2.0) but not built from F-Droid's source —
# hence the NonFreeDep AntiFeature. The obvious from-source substitute, de.schliweb:tensorflow-lite-fdroid,
# was tried and REJECTED: it miscomputes our Detoxify/ALBERT model (saturates every output to 0/1 on-device,
# verified independent of the XNNPACK delegate), so it would make Knit block every message. See
# .agents/context/distribution.md for the full evidence (and the SUSS false-positive on the bare 1.4.x line).
AntiFeatures:
  NonFreeDep:
    en-US: On-device content filtering uses Google's prebuilt TensorFlow Lite.
# Validated against fdroiddata's config/categories.yml (108 categories — the old ~17-category list is long
# gone). Deliberately NOT "Internet": Knit works without it, and filing an offline mesh messenger under
# Internet misdescribes it. `fdroid lint` will reject any name not in that file.
Categories:
  - Messaging
  - Connectivity
  - Security
License: GPL-3.0-or-later
AuthorName: Jeffrey Walter Mixon
WebSite: https://github.com/getknit/knit
SourceCode: https://github.com/getknit/knit
IssueTracker: https://github.com/getknit/knit/issues
Changelog: https://github.com/getknit/knit/releases
Donate: https://ko-fi.com/zaventh
# Bare user/group name, not a URL — F-Droid builds the link itself. Field order matters to
# fdroidserver's canonical writer: Liberapay goes directly after Donate.
Liberapay: zaventh

AutoName: Knit

RepoType: git
Repo: https://github.com/getknit/knit.git

# Reproducible-build flow: F-Droid rebuilds the tagged commit, byte-compares against the APK below, and on
# a match distributes OUR signed APK rather than re-signing with F-Droid's key. See distribution.md for why
# that matters here (Knit's offline app-share hands peers this same APK).
Binaries: https://github.com/getknit/knit/releases/download/v%v/knit-%v.apk
AllowedAPKSigningKeys: b18a283d11797c2a84a008c1fcb9e1b864e7b4c3b301408f7a4a80624b0e631c

# Durable note for fdroiddata maintainers (survives the MR merge, unlike the MR description).
MaintainerNotes: litert (com.google.ai.edge.litert:litert) is Google's prebuilt TensorFlow Lite, declared
  NonFreeDep because the from-source de.schliweb:tensorflow-lite-fdroid miscomputes this app's Detoxify/ALBERT
  toxicity model (saturates every output to 0/1, verified on-device), which would make it flag every message.
  The 1.4.x line is Apache-2.0 and depends only on litert-api.

Builds:
  - versionName: 2.2.1
    versionCode: 10
    commit: 4a3a69f2f7088727e1b88513a830d02cd1357395
    subdir: app
    gradle:
      - yes
    # The source scanner flags litert (com.google.ai.edge.litert) as a prebuilt Google-Maven binary via the
    # SUSS `litert:(2|1.[34])` signature, which wrongly matches our bare 1.4.x line, so this build hard-fails
    # the scanner until that signature is narrowed upstream (fdroid-suss). litert is a deliberate, documented
    # dependency (see AntiFeatures above); the from-source substitute was rejected (see the top comment).
    output: build/outputs/apk/release/app-release-unsigned.apk
    # No `ndk:` line on purpose — the APK path needs no NDK (see distribution.md). Native-symbol
    # extraction is gated behind -Pknit.nativeSymbols=true and only runs for the Play AAB.

# versionCode/versionName live in gradle.properties and are read via providers.gradleProperty(), which
# fdroidserver's build-file parser cannot evaluate. UpdateCheckData points it at the file instead — the
# same pattern metadata/org.osmdroid.yml uses. Verify with `fdroid checkupdates` before submitting.
# AutoUpdateMode is bare `Version` (NOT `Version v%v`): under UpdateCheckMode: Tags the schema forbids a
# format string — the tag itself is the version source. `Version v%v` is a UpdateCheckMode: HTTP construct
# and fails schema validation with Tags.
AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: gradle.properties|knit\.versionCode=(\d+)|.|knit\.versionName=(.*)
CurrentVersion: 2.2.1
CurrentVersionCode: 10
