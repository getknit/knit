# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html
# Specifies the JVM arguments used for the daemon process.
# Local/default profile — full worker parallelism. Kotlin compiles IN-PROCESS (see the strategy setting
# below), not via a persistent standalone Kotlin daemon. CI (a 1 vCPU / 2 GB runner) overrides the heap/GC
# and serializes workers via $GRADLE_USER_HOME/gradle.properties — see .gitlab-ci.yml. Note: do NOT add a
# tight -XX:MaxMetaspaceSize here; AGP 9 / KSP / Compose load enough classes that a low cap starves
# Metaspace and crashes the daemon (bit us on the CI runner at 384m). In-process Kotlin now shares this
# daemon heap, so if compilation gets Metaspace/heap-tight, raise -Xmx rather than capping Metaspace.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Run the Kotlin compiler INSIDE the Gradle daemon instead of a separate, shared Kotlin daemon. This repo
# lives in many git worktrees that all share one ~/.gradle, so a shared out-of-process Kotlin daemon gets
# wedged into "Daemon compilation failed" states when two worktrees — or Android Studio and a CLI/stop-hook
# build — compile at the same time. In-process keeps each build's Kotlin compilation isolated to its own
# Gradle daemon (CI already runs in-process for memory reasons). Trades a little cold-build speed for that
# isolation; if it ever regresses iterative-build speed materially, reconsider per-worktree GRADLE_USER_HOME.
kotlin.compiler.execution.strategy=in-process
# When configured, Gradle will run in incubating parallel mode.
# This option should only be used with decoupled projects. For more details, visit
# https://developer.android.com/r/tools/gradle-multi-project-decoupled-projects
# org.gradle.parallel=true
# When enabled, the Configuration Cache allows Gradle to skip the configuration
# phase entirely if nothing that affects the build configuration (such as build scripts)
# has changed. Additionally, Gradle applies performance optimizations to task execution.
org.gradle.configuration-cache=true
# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official
# AGP 9 built-in Kotlin disallows the kotlin.sourceSets DSL by default, which KSP
# (Room's annotation processor) uses to register its generated sources. Allow it.
android.disallowKotlinSourceSets=false
# App version — single source of truth, read by app/build.gradle.kts defaultConfig. Bump versionCode for
# every Play upload (Play App Signing requires it to strictly increase); CI can inject a monotonic value
# with -Pknit.versionCode=$CI_PIPELINE_IID without editing this file.
# KEEP THE GIT TAG EQUAL TO `v<versionName>`. fdroiddata expands `%v` to the *versionName* in both the
# `Binaries:` URL and `AutoUpdateMode: Version v%v`, so the v2.1 / tag-v2.1.0 mismatch we shipped at 2.1.0
# would have broken F-Droid's binary lookup and update check. Three-component versionName from here on.
knit.versionCode=10
knit.versionName=2.2.1